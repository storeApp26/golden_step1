<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>متجر الأحذية</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --black:#080808;--gold:#c9a84c;--gold2:#e8c97a;
}

*{margin:0;padding:0;box-sizing:border-box;transition:.2s}

body{
  font-family:'Cairo',sans-serif;
  background:var(--black);
  color:#fff;
  overflow-x:hidden;
}

nav{
  position:fixed;
  top:0;
  width:100%;
  padding:10px 12px;
  display:flex;
  justify-content:space-between;
  background:#000;
  z-index:100;
}

.logo{color:var(--gold);font-weight:700}

.hero{
  padding-top:80px;
  text-align:center;
}

.hero h1{font-size:32px}
.hero p{color:#aaa}

.hero button{
  background:var(--gold);
  border:none;
  padding:12px 20px;
  margin-top:10px;
  font-weight:bold;
}

section{padding:20px 12px}

.product-page{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}

@media(min-width:900px){
  .product-page{
    grid-template-columns:1fr 1fr;
  }
}

.swiper-wrap{
  width:100%;
  aspect-ratio:4/5;
  background:#111;
  border-radius:16px;
}

.prod-name{font-size:18px}
.prod-price{font-size:22px;color:var(--gold)}

.prod-add-btn{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;
  font-weight:bold;
}

@media(max-width:768px){
  .prod-add-btn{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;
    border-radius:12px;
  }

  body{padding-bottom:80px}
}

</style>
</head>

<body>

<nav>
  <div class="logo">SHOE</div>
  <div>🛍</div>
</nav>

<div class="hero">
  <h1>متجر الأحذية</h1>
  <p>أفضل الأحذية بأفضل سعر</p>
  <button>اطلب الآن</button>
</div>

<section>
  <div class="product-page">
    
    <div class="swiper-wrap"></div>

    <div>
      <div class="prod-name">حذاء فاخر</div>
      <div class="prod-price">3500 دج</div>

      <button class="prod-add-btn">اطلب الآن</button>
    </div>

  </div>
</section>

</body>
</html>
